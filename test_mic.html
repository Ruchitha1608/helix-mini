<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Helix Mini — Mic Test</title>
  <style>
    body { font-family: monospace; background: #0d0d0d; color: #e0e0e0; padding: 32px; max-width: 720px; }
    h1 { color: #7dd3fc; font-size: 1.1rem; margin-bottom: 4px; }
    p.sub { color: #555; font-size: 0.85rem; margin: 0 0 24px; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-family: monospace; font-size: 0.9rem; margin-right: 8px; }
    #startBtn { background: #22c55e; color: #000; }
    #stopBtn  { background: #ef4444; color: #fff; display: none; }
    #log { margin-top: 24px; background: #111; border-radius: 6px; padding: 16px; min-height: 200px; font-size: 0.82rem; line-height: 1.7; overflow-y: auto; max-height: 480px; }
    .ok   { color: #22c55e; }
    .warn { color: #facc15; }
    .err  { color: #ef4444; }
    .dim  { color: #555; }
    .transcript { color: #7dd3fc; }
    .response   { color: #d8b4fe; }
    #status { margin-top: 12px; font-size: 0.82rem; color: #555; }
  </style>
</head>
<body>

<h1>Helix Mini — Live Microphone Test</h1>
<p class="sub">Connects WebSocket → Deepgram STT → Claude → Cartesia TTS. Tests the full voice path.</p>

<div style="margin-bottom:16px;">
  <label style="font-size:0.85rem;color:#888;">Drug: </label>
  <select id="drug" style="background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;padding:4px 8px;font-family:monospace;">
    <option value="lisinopril">lisinopril</option>
    <option value="metformin">metformin</option>
  </select>
  <label style="font-size:0.85rem;color:#888;margin-left:16px;">Days on treatment: </label>
  <input id="days" type="number" value="7" min="0" style="width:60px;background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:4px;padding:4px 8px;font-family:monospace;">
</div>

<button id="startBtn" onclick="start()">Start Call</button>
<button id="stopBtn"  onclick="stop()">End Call</button>

<div id="log"><span class="dim">Ready. Click Start Call.</span></div>
<div id="status"></div>

<script>
  let ws, stream, processor, ctx, sessionId;
  const log = document.getElementById('log');
  const status = document.getElementById('status');

  function line(text, cls) {
    const d = document.createElement('div');
    d.className = cls || '';
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  function ts() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }

  async function start() {
    log.innerHTML = '';
    sessionId = 'mic-test-' + Date.now();
    const drug = document.getElementById('drug').value;
    const days = parseInt(document.getElementById('days').value) || 0;

    line(`[${ts()}] Connecting to Helix Mini...`, 'dim');
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display  = 'inline-block';

    ws = new WebSocket(`ws://localhost:8000/voice/ws/${sessionId}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = async () => {
      line(`[${ts()}] WebSocket connected`, 'ok');
      ws.send(JSON.stringify({
        type: 'config',
        patient: { drug_name: drug, days_on_treatment: days, dose_schedule: 'as prescribed', known_conditions: [] }
      }));

      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true } });
        ctx = new AudioContext({ sampleRate: 16000 });
        const src = ctx.createMediaStreamSource(stream);
        processor = ctx.createScriptProcessor(4096, 1, 1);

        processor.onaudioprocess = e => {
          if (ws.readyState !== WebSocket.OPEN) return;
          const f32 = e.inputBuffer.getChannelData(0);
          const i16 = new Int16Array(f32.length);
          for (let i = 0; i < f32.length; i++) i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
          ws.send(i16.buffer);
        };

        src.connect(processor);
        processor.connect(ctx.destination);
        line(`[${ts()}] Microphone active — speak now`, 'ok');
        status.textContent = 'Listening...';
      } catch (err) {
        line(`[${ts()}] Mic error: ${err.message}`, 'err');
      }
    };

    const audioQueue = [];
    let playing = false;

    async function playNext() {
      if (playing || audioQueue.length === 0) return;
      playing = true;
      const buf = audioQueue.shift();
      const ac = new AudioContext({ sampleRate: 44100 });
      const f32 = new Float32Array(buf.byteLength / 4);
      const view = new DataView(buf);
      for (let i = 0; i < f32.length; i++) f32[i] = view.getFloat32(i * 4, true);
      const ab = ac.createBuffer(1, f32.length, 44100);
      ab.getChannelData(0).set(f32);
      const src = ac.createBufferSource();
      src.buffer = ab;
      src.connect(ac.destination);
      src.onended = () => { playing = false; playNext(); };
      src.start();
    }

    ws.onmessage = async e => {
      if (typeof e.data === 'string') {
        const msg = JSON.parse(e.data);
        if (msg.type === 'ready') {
          line(`[${ts()}] Ready — ${msg.message}`, 'ok');
        } else if (msg.type === 'transcript') {
          line(`[${ts()}] You: ${msg.text}`, 'transcript');
          status.textContent = 'Processing...';
        } else if (msg.type === 'response') {
          const prefix = msg.escalate ? '[ESCALATE] ' : '';
          line(`[${ts()}] Helix: ${prefix}${msg.text}`, 'response');
          status.textContent = 'Speaking...';
        } else if (msg.type === 'summary') {
          line(`[${ts()}] Call ended`, 'ok');
          line(JSON.stringify(msg.data, null, 2), 'dim');
        }
      } else {
        audioQueue.push(e.data);
        playNext();
        status.textContent = 'Listening...';
      }
    };

    ws.onerror = () => line(`[${ts()}] WebSocket error — is the server running?`, 'err');
    ws.onclose = () => { line(`[${ts()}] Disconnected`, 'dim'); status.textContent = ''; };
  }

  function stop() {
    if (processor) { processor.disconnect(); processor = null; }
    if (stream)    { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (ctx)       { ctx.close(); ctx = null; }
    if (ws)        { ws.close(); ws = null; }
    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('stopBtn').style.display  = 'none';
    status.textContent = '';
  }
</script>
</body>
</html>
